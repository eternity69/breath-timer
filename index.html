<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{
  background:#1a1a2e;
  color:#fff;
  font-family:Georgia,'Times New Roman',serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  user-select:none;-webkit-user-select:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  transition:background-color 1s ease, color 0.8s ease;
}

/* ===== MENU SCREEN ===== */
#menu-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;width:100%;height:100%;padding:20px;
  position:absolute;top:0;left:0;z-index:10;
}
#menu-screen h1{
  font-family:Georgia,serif;
  font-size:2.4em;font-weight:400;
  color:rgba(255,255,255,0.9);
  text-align:center;letter-spacing:0.02em;
}
#menu-screen .subtitle{color:rgba(255,255,255,0.45);font-size:1em;font-style:italic;margin-bottom:8px}

.menu-btn{
  width:min(88%,360px);padding:20px 24px;
  border:1px solid rgba(255,255,255,0.12);border-radius:20px;
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.9);font-family:Georgia,serif;font-size:1.1em;
  cursor:pointer;transition:all .3s;text-align:left;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.menu-btn:active,.menu-btn:hover{background:rgba(255,255,255,0.12);transform:scale(1.02)}
.menu-btn .btn-title{font-size:1.15em;font-weight:400;margin-bottom:4px}
.menu-btn .btn-desc{font-size:0.8em;color:rgba(255,255,255,0.45);font-style:italic}

/* ===== PRACTICE SELECT ===== */
#practice-select{
  display:none;flex-direction:column;align-items:center;
  width:100%;height:100%;padding:20px;
  position:absolute;top:0;left:0;z-index:10;overflow-y:auto;
}
#practice-select h2{font-family:Georgia,serif;font-size:1.5em;font-weight:400;color:rgba(255,255,255,0.85);margin-bottom:16px;margin-top:10px}
.practice-list{width:min(95%,400px);display:flex;flex-direction:column;gap:6px;padding-bottom:30px}
.practice-item{
  padding:14px 18px;border:none;border-bottom:1px solid rgba(255,255,255,0.08);
  border-radius:0;background:transparent;
  cursor:pointer;transition:all .2s;
  display:flex;justify-content:space-between;align-items:center;
}
.practice-item:active{background:rgba(255,255,255,0.08)}
.practice-item .p-name{font-family:Georgia,serif;font-size:1em;color:rgba(255,255,255,0.85)}
.practice-item .p-time{font-family:Georgia,serif;font-size:0.85em;color:rgba(255,255,255,0.4)}
.back-btn{
  padding:10px 24px;border:1px solid rgba(255,255,255,0.15);border-radius:24px;
  background:transparent;color:rgba(255,255,255,0.7);
  font-family:Georgia,serif;font-size:1em;cursor:pointer;margin-top:12px;margin-bottom:10px;
}

/* ===== TIMER SCREEN ===== */
#timer-screen{
  display:none;flex-direction:column;align-items:center;justify-content:space-between;
  width:100%;height:100%;padding:20px 16px 12px;
  position:absolute;top:0;left:0;
  transition:background-color 1s ease;
}
.top-section{text-align:center;width:100%;flex-shrink:0;padding-top:8px}
.body-badge{
  display:inline-block;padding:3px 12px;border-radius:20px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:0.72em;
  background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);
  margin-bottom:6px;transition:background 0.8s,color 0.8s;
}
.body-badge.dark-text{background:rgba(0,0,0,0.08);color:rgba(60,50,40,0.6)}
.practice-name{
  font-family:Georgia,serif;font-size:1.3em;font-weight:400;
  color:#fff;line-height:1.3;min-height:1.6em;
  display:flex;align-items:center;justify-content:center;
  transition:color 0.8s;
}
.practice-hint{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:0.75em;color:rgba(255,255,255,0.5);margin-top:4px;min-height:1.2em;padding:0 10px;
  transition:color 0.8s;
}

/* ===== CONCENTRIC CIRCLES ===== */
.circles-container{
  position:relative;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;width:100%;flex:1;max-height:60vh;
}
.circle-ring{
  position:absolute;border-radius:50%;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1),height 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.8s,background-color 1s;
}
.circle-ring-1{width:280px;height:280px;background:rgba(232,116,32,0.12);z-index:1}
.circle-ring-2{width:220px;height:220px;background:rgba(232,116,32,0.18);z-index:2}
.circle-ring-3{width:160px;height:160px;background:rgba(232,116,32,0.25);z-index:3}
.circle-ring-4{width:110px;height:110px;background:rgba(232,116,32,0.35);z-index:4}
.circle-content{
  position:relative;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
}
.breath-label{
  font-family:Georgia,serif;font-size:44px;font-weight:400;
  color:#fff;letter-spacing:0.04em;
  transition:color 0.8s;
}
.breath-mantra{font-family:Georgia,serif;font-size:1.2em;color:rgba(255,255,255,0.7);margin-top:4px;transition:color 0.8s}
.phase-counter{
  font-family:Georgia,serif;font-size:1.3em;
  color:rgba(255,255,255,0.95);margin-top:4px;
  font-weight:bold;
  text-shadow:0 1px 4px rgba(0,0,0,0.3);
  transition:color 0.8s;
}

/* ===== BOTTOM SECTION ===== */
.bottom-section{width:100%;text-align:center;flex-shrink:0}
.time-display{
  font-family:Georgia,serif;font-size:30px;font-weight:400;
  color:#fff;font-variant-numeric:tabular-nums;
  letter-spacing:3px;margin-bottom:16px;
  transition:color 0.8s;
}
.controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px}
.ctrl-btn{
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);
  font-size:1.1em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s,background-color 0.8s,color 0.8s;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.ctrl-btn:active{transform:scale(0.88);opacity:0.7}
.ctrl-btn.main-btn{
  width:64px;height:64px;
  background:rgba(255,255,255,0.95);color:#333;
  font-size:1.5em;
  box-shadow:0 2px 20px rgba(0,0,0,0.15);
}
.ctrl-btn.main-btn:active{transform:scale(0.9)}
.ctrl-btn.dark-bg{background:rgba(0,0,0,0.1);color:rgba(60,50,40,0.6)}
.ctrl-btn.main-btn.dark-bg{background:rgba(255,255,255,0.95);color:#333}

.progress-bar-container{
  width:100%;height:3px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;margin-bottom:4px;
  transition:background-color 0.8s;
}
.progress-bar-container.dark-bg-bar{background:rgba(0,0,0,0.08)}
.progress-bar{
  height:100%;background:rgba(255,255,255,0.5);
  transition:width 0.5s ease,background-color 0.8s;
}
.progress-bar.dark-bar{background:rgba(80,70,50,0.3)}
.progress-text{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:0.7em;color:rgba(255,255,255,0.35);
  transition:color 0.8s;
}

/* ===== COMPLETION ===== */
#complete-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;width:100%;height:100%;
  position:absolute;top:0;left:0;z-index:10;
}
#complete-screen h2{font-family:Georgia,serif;font-size:2em;font-weight:400;color:rgba(255,255,255,0.9)}
#complete-screen .complete-emoji{font-size:4em}
#complete-screen .complete-time{font-family:Georgia,serif;color:rgba(255,255,255,0.5);font-size:1.1em}

/* ===== DARK TEXT STATE (for cream bg) ===== */
.dark-text .practice-name,
.dark-text .breath-label{color:#3c3228 !important}
.dark-text .practice-hint{color:rgba(60,50,40,0.5) !important}
.dark-text .time-display{color:#3c3228 !important}
.dark-text .breath-mantra{color:rgba(60,50,40,0.6) !important}
.dark-text .phase-counter{color:rgba(60,50,40,0.9) !important;text-shadow:none}
.dark-text .progress-text{color:rgba(60,50,40,0.35) !important}

@media(min-height:700px){
  .circle-ring-1{width:320px;height:320px}
  .circle-ring-2{width:250px;height:250px}
  .circle-ring-3{width:185px;height:185px}
  .circle-ring-4{width:130px;height:130px}
  .breath-label{font-size:48px}
}
@media(min-height:800px){
  .circle-ring-1{width:360px;height:360px}
  .circle-ring-2{width:280px;height:280px}
  .circle-ring-3{width:210px;height:210px}
  .circle-ring-4{width:150px;height:150px}
}
@media(max-height:600px){
  .circle-ring-1{width:220px;height:220px}
  .circle-ring-2{width:170px;height:170px}
  .circle-ring-3{width:125px;height:125px}
  .circle-ring-4{width:85px;height:85px}
  .breath-label{font-size:36px}
  .time-display{font-size:26px}
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen">
  <h1>Breath Timer</h1>
  <div class="subtitle">дыхательные практики</div>
  <button class="menu-btn" onclick="startSequence('morning')">
    <div class="btn-title">☀️ Утро — 60 мин</div>
    <div class="btn-desc">7 практик • Прана + Мужская сила</div>
  </button>
  <button class="menu-btn" onclick="startSequence('evening')">
    <div class="btn-title">🌙 Вечер — 15 мин</div>
    <div class="btn-desc">Расслабление • Подготовка ко сну</div>
  </button>
  <button class="menu-btn" onclick="showPracticeSelect()">
    <div class="btn-title">🎯 Отдельная практика</div>
    <div class="btn-desc">Выбери одну практику</div>
  </button>
</div>

<!-- PRACTICE SELECT -->
<div id="practice-select">
  <button class="back-btn" onclick="showMenu()">← Назад</button>
  <h2>Выбери практику</h2>
  <div class="practice-list" id="practice-list"></div>
</div>

<!-- TIMER -->
<div id="timer-screen">
  <div class="top-section">
    <div class="body-badge" id="body-badge"></div>
    <div class="practice-name" id="practice-name"></div>
    <div class="practice-hint" id="practice-hint"></div>
  </div>

  <div class="circles-container" id="circles-container">
    <div class="circle-ring circle-ring-1" id="ring1"></div>
    <div class="circle-ring circle-ring-2" id="ring2"></div>
    <div class="circle-ring circle-ring-3" id="ring3"></div>
    <div class="circle-ring circle-ring-4" id="ring4"></div>
    <div class="circle-content">
      <div class="breath-label" id="breath-label"></div>
      <div class="breath-mantra" id="breath-mantra"></div>
      <div class="phase-counter" id="phase-counter"></div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="time-display" id="time-display">00:00</div>
    <div class="controls">
      <button class="ctrl-btn" id="btn-reset" onclick="resetAll()" title="Сначала">🔄</button>
      <button class="ctrl-btn main-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" id="btn-skip" onclick="skipPractice()" title="Пропустить">⏭</button>
    </div>
    <div class="progress-bar-container" id="progress-bar-container">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</div>

<!-- COMPLETE -->
<div id="complete-screen">
  <div class="complete-emoji">🙏</div>
  <h2>Практика завершена</h2>
  <div class="complete-time" id="complete-time"></div>
  <button class="menu-btn" onclick="showMenu()" style="margin-top:20px;text-align:center">
    <div class="btn-title">← В меню</div>
  </button>
</div>

<script>
// ===== PRACTICES DATA =====
// Программа 1: «Прана + Мужская сила» — 40 дней без изменений
const ALL_PRACTICES = [
  {id:0,name:"Adi Mantra",duration:180,body:"Вход",hint:"Пой ONG NAMO GURU DEV NAMO 3 раза. Руки в намасте. Глаза закрыты, точка между бровей.",animation:null},
  {id:1,name:"Полное йоговское дыхание",duration:660,body:"Тело 8 ⭐",hint:"Вдох: живот → рёбра → грудь. Выдох обратно. 6 вдохов в минуту. Каждые 2 недели +1 сек.",animation:{type:"simple",inhale:5,exhale:5}},
  {id:2,name:"Нади Шодхана",duration:660,body:"Тело 8+9",hint:"Попеременное дыхание. Правая ноздря закрыта → вдох левой 4с → задержка 4с → выдох правой 4с.",animation:{type:"hold",inhale:4,hold:4,exhale:4}},
  {id:3,name:"Sat Kriya",duration:420,body:"Тело 8 ⭐",hint:"Руки вверх, ладони вместе. SAT — втяни пупок резко. NAM — отпусти. Ритм 1с+1с. Ojas вверх.",animation:{type:"mantra",beats:[{label:"SAT",duration:1,scale:"inhale"},{label:"NAM",duration:1,scale:"exhale"}]}},
  {id:4,name:"SO HUNG",duration:420,body:"Тело 2",hint:"Ноги вытянуты, отклонись назад. Гьян Мудра. Вдох 4 части: SO-SO-SO-SO. Выдох 4 части: HUNG-HUNG-HUNG-HUNG.",animation:{type:"mantraMulti",inhaleMantra:"SO",exhaleMantra:"HUNG",parts:4,partDuration:1}},
  {id:5,name:"Дыхание 4:1",duration:420,body:"Тело 7",hint:"Вдох в 4 равные части через нос (руки поднимаются). Выдох одним потоком (руки вниз). Расширяет ауру.",animation:{type:"multipart",inhaleCount:4,inhalePart:1,exhale:2}},
  {id:6,name:"Шавасана",duration:660,body:"Интеграция",hint:"Лечь на спину. Ноги шире таза. Руки ладонями вверх. Отпусти дыхание. Отпусти всё.",animation:null}
];

// Вечер: левая ноздря + Белый Лебедь + расслабление
const EVENING_PRACTICES = [
  {id:10,name:"Левая ноздря",duration:180,body:"Тело 9",hint:"Закрой правую ноздрю. Дыши только левой. Медленно, глубоко. Активация Иды.",animation:{type:"simple",inhale:5,exhale:5}},
  {id:11,name:"Медитация Белого Лебедя",duration:420,body:"Тело 9",hint:"Руки-лебедь перед глазами. Смотри на большие пальцы → закрой глаза, продолжай видеть. SAT на вдохе, NAM на выдохе.",animation:{type:"mantra",beats:[{label:"SAT",duration:4,scale:"inhale"},{label:"NAM",duration:4,scale:"exhale"}]}},
  {id:12,name:"Расслабление",duration:300,body:"Тело 9",hint:"Отпусти всё. Можно сразу в сон.",animation:null}
];

const EVENING_INDICES = null; // не используем старый формат

// ===== COLOR THEMES =====
const COLORS = {
  inhale:  { bg:'#E87420', ring1:'rgba(195,80,5,0.19)', ring2:'rgba(215,98,18,0.27)', ring3:'rgba(238,120,35,0.36)', ring4:'rgba(255,153,63,0.46)', text:'#fff', dark:false },
  exhale:  { bg:'#7A8C3A', ring1:'rgba(83,103,28,0.19)', ring2:'rgba(100,120,38,0.27)', ring3:'rgba(123,145,53,0.36)', ring4:'rgba(145,173,73,0.46)', text:'#fff', dark:false },
  hold:    { bg:'#F5F0E8', ring1:'rgba(190,173,145,0.20)', ring2:'rgba(180,163,135,0.28)', ring3:'rgba(170,153,125,0.37)', ring4:'rgba(160,143,115,0.47)', text:'#3c3228', dark:true },
  pause:   { bg:'#F5F0E8', ring1:'rgba(190,173,145,0.16)', ring2:'rgba(180,163,135,0.24)', ring3:'rgba(170,153,125,0.32)', ring4:'rgba(160,143,115,0.42)', text:'#3c3228', dark:true },
  idle:    { bg:'#E87420', ring1:'rgba(195,80,5,0.15)', ring2:'rgba(215,98,18,0.23)', ring3:'rgba(238,120,35,0.31)', ring4:'rgba(255,153,63,0.40)', text:'#fff', dark:false },
  menu:    { bg:'#1a1a2e' }
};

// ===== STATE =====
let currentSequence = [];
let currentIndex = 0;
let timeLeft = 0;
let isRunning = false;
let timerInterval = null;
let animFrameId = null;
let wakeLock = null;
let audioCtx = null;
let startTime = 0;
let currentPhase = 'idle'; // inhale, exhale, hold, idle, pause

// ===== ELEMENTS =====
const menuScreen = document.getElementById('menu-screen');
const practiceSelect = document.getElementById('practice-select');
const timerScreen = document.getElementById('timer-screen');
const completeScreen = document.getElementById('complete-screen');
const ring1 = document.getElementById('ring1');
const ring2 = document.getElementById('ring2');
const ring3 = document.getElementById('ring3');
const ring4 = document.getElementById('ring4');

// ===== THEME APPLICATION =====
function applyTheme(phase) {
  currentPhase = phase;
  const c = COLORS[phase] || COLORS.idle;
  document.body.style.backgroundColor = c.bg;
  
  if (timerScreen.style.display !== 'none') {
    ring1.style.backgroundColor = c.ring1;
    ring2.style.backgroundColor = c.ring2;
    ring3.style.backgroundColor = c.ring3;
    ring4.style.backgroundColor = c.ring4;
  }
  
  const ts = document.getElementById('timer-screen');
  const badge = document.getElementById('body-badge');
  const btnReset = document.getElementById('btn-reset');
  const btnSkip = document.getElementById('btn-skip');
  const playBtn = document.getElementById('play-btn');
  const pbc = document.getElementById('progress-bar-container');
  const pb = document.getElementById('progress-bar');
  
  if (c.dark) {
    ts.classList.add('dark-text');
    badge.classList.add('dark-text');
    btnReset.classList.add('dark-bg');
    btnSkip.classList.add('dark-bg');
    playBtn.classList.add('dark-bg');
    pbc.classList.add('dark-bg-bar');
    pb.classList.add('dark-bar');
  } else {
    ts.classList.remove('dark-text');
    badge.classList.remove('dark-text');
    btnReset.classList.remove('dark-bg');
    btnSkip.classList.remove('dark-bg');
    playBtn.classList.remove('dark-bg');
    pbc.classList.remove('dark-bg-bar');
    pb.classList.remove('dark-bar');
  }
}

// ===== SCREENS =====
function hideAll(){
  menuScreen.style.display='none';
  practiceSelect.style.display='none';
  timerScreen.style.display='none';
  completeScreen.style.display='none';
}

function showMenu(){
  stopTimer();
  releaseWakeLock();
  hideAll();
  menuScreen.style.display='flex';
  document.body.style.backgroundColor = COLORS.menu.bg;
  document.body.style.color = '#fff';
}

function showPracticeSelect(){
  hideAll();
  practiceSelect.style.display='flex';
  document.body.style.backgroundColor = COLORS.menu.bg;
  const list=document.getElementById('practice-list');
  list.innerHTML='';
  const allPractices = [...ALL_PRACTICES, ...EVENING_PRACTICES];
  allPractices.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='practice-item';
    el.innerHTML=`<span class="p-name">${p.name}</span><span class="p-time">${formatTime(p.duration)}</span>`;
    el.onclick=()=>{
      currentSequence=[{...p}];
      currentIndex=0;
      startTime=Date.now();
      hideAll();
      timerScreen.style.display='flex';
      acquireWakeLock();
      loadPractice();
    };
    list.appendChild(el);
  });
}

// ===== START =====
function startSequence(type){
  if(type==='morning'){
    currentSequence=[...ALL_PRACTICES];
  } else {
    currentSequence=[...EVENING_PRACTICES];
  }
  currentIndex=0;
  startTime=Date.now();
  hideAll();
  timerScreen.style.display='flex';
  loadPractice(0);
}

function startSingle(idx){
  currentSequence=[{...ALL_PRACTICES[idx]}];
  currentIndex=0;
  startTime=Date.now();
  hideAll();
  timerScreen.style.display='flex';
  loadPractice(0);
}

// ===== LOAD PRACTICE =====
function loadPractice(idx){
  if(idx>=currentSequence.length){
    showComplete();
    return;
  }
  currentIndex=idx;
  const p=currentSequence[idx];
  timeLeft=p.duration;

  document.getElementById('practice-name').textContent=p.name;
  document.getElementById('practice-hint').textContent=p.hint||'';
  document.getElementById('body-badge').textContent=p.body||'';
  updateTimeDisplay();
  updateProgress();
  resetCircles();
  applyTheme('pause');

  if(idx>0){
    playGong();
    vibrate();
  }
}

// ===== TIMER =====
function togglePlay(){
  if(isRunning){
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer(){
  isRunning=true;
  document.getElementById('play-btn').textContent='⏸';
  requestWakeLock();
  requestFullscreen();
  lastTick=Date.now();
  timerInterval=setInterval(tick,100);
  startAnimation();
}

let lastTick=0;
function tick(){
  const now=Date.now();
  const delta=(now-lastTick)/1000;
  lastTick=now;
  timeLeft-=delta;
  if(timeLeft<=0){
    timeLeft=0;
    updateTimeDisplay();
    nextPractice();
    return;
  }
  updateTimeDisplay();
}

function pauseTimer(){
  isRunning=false;
  document.getElementById('play-btn').textContent='▶';
  clearInterval(timerInterval);
  stopAnimation();
  applyTheme('pause');
}

function stopTimer(){
  isRunning=false;
  document.getElementById('play-btn').textContent='▶';
  clearInterval(timerInterval);
  stopAnimation();
}

function skipPractice(){
  stopTimer();
  nextPractice();
}

function nextPractice(){
  stopTimer();
  if(currentIndex+1>=currentSequence.length){
    showComplete();
  } else {
    loadPractice(currentIndex+1);
    startTimer();
  }
}

function resetAll(){
  stopTimer();
  releaseWakeLock();
  showMenu();
}

function showComplete(){
  stopTimer();
  releaseWakeLock();
  hideAll();
  completeScreen.style.display='flex';
  document.body.style.backgroundColor = COLORS.menu.bg;
  const elapsed=Math.round((Date.now()-startTime)/1000);
  document.getElementById('complete-time').textContent=`Время: ${formatTime(elapsed)}`;
  playGong();
  vibrate();
}

function updateTimeDisplay(){
  document.getElementById('time-display').textContent=formatTime(Math.ceil(timeLeft));
}

function updateProgress(){
  const total=currentSequence.length;
  const pct=total>0?(currentIndex/total)*100:0;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${currentIndex+1} / ${total}`;
}

function formatTime(s){
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

// ===== CIRCLE SIZES =====
// Base sizes (will be read from computed styles or set directly)
const BASE = {
  r1: {min:0.55, max:1.0},
  r2: {min:0.55, max:1.0},
  r3: {min:0.55, max:1.0},
  r4: {min:0.55, max:1.0}
};

function setRingsScale(scale) {
  // scale: 0 = fully contracted, 1 = fully expanded
  const s = 0.55 + 0.45 * scale;
  ring1.style.transform = `scale(${s * 0.95})`;
  ring2.style.transform = `scale(${s * 0.97})`;
  ring3.style.transform = `scale(${s * 0.99})`;
  ring4.style.transform = `scale(${s})`;
}

function setRingsTransition(dur) {
  const t = `transform ${dur}s cubic-bezier(0.4,0,0.2,1)`;
  ring1.style.transition = `${t}, background-color 1s`;
  ring2.style.transition = `${t}, background-color 1s`;
  ring3.style.transition = `${t}, background-color 1s`;
  ring4.style.transition = `${t}, background-color 1s`;
}

function setRingsNoTransition() {
  ring1.style.transition = 'background-color 1s';
  ring2.style.transition = 'background-color 1s';
  ring3.style.transition = 'background-color 1s';
  ring4.style.transition = 'background-color 1s';
}

function resetCircles(){
  setRingsNoTransition();
  setRingsScale(0.3);
  document.getElementById('breath-label').textContent='';
  document.getElementById('breath-mantra').textContent='';
  document.getElementById('phase-counter').textContent='';
}

// ===== ANIMATION =====
let animStartTime=0;

function startAnimation(){
  animStartTime=Date.now();
  stopAnimation();
  runAnimation();
}

function stopAnimation(){
  if(animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId=null;
}

function runAnimation(){
  if(!isRunning) return;
  const p=currentSequence[currentIndex];
  const anim=p.animation;
  const label=document.getElementById('breath-label');
  const mantra=document.getElementById('breath-mantra');
  const counter=document.getElementById('phase-counter');

  if(!anim){
    // No animation — gentle pulse, use inhale color
    const t=(Date.now()-animStartTime)/1000;
    const s=0.35+0.08*Math.sin(t*0.8);
    setRingsNoTransition();
    setRingsScale(s);
    label.textContent='🧘';
    mantra.textContent='';
    counter.textContent='';
    applyTheme('inhale');
    animFrameId=requestAnimationFrame(runAnimation);
    return;
  }

  const elapsed=(Date.now()-animStartTime)/1000;

  if(anim.type==='simple'){
    const cycle=anim.inhale+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<anim.inhale){
      const progress=pos/anim.inhale;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent=anim.inhaleLabel||'Вдох';
      counter.textContent=Math.ceil(anim.inhale-pos)+'с';
      applyTheme('inhale');
    } else {
      const exPos=pos-anim.inhale;
      const progress=1-exPos/anim.exhale;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent=anim.exhaleLabel||'Выдох';
      counter.textContent=Math.ceil(anim.exhale-exPos)+'с';
      applyTheme('exhale');
    }
    mantra.textContent='';
  }
  else if(anim.type==='hold'){
    const cycle=anim.inhale+anim.hold+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<anim.inhale){
      const progress=pos/anim.inhale;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Вдох';
      counter.textContent=Math.ceil(anim.inhale-pos)+'с';
      applyTheme('inhale');
    } else if(pos<anim.inhale+anim.hold){
      // Hold — static with subtle shimmer
      const holdElapsed=pos-anim.inhale;
      const shimmer=1.0+0.02*Math.sin(holdElapsed*3);
      setRingsNoTransition();
      setRingsScale(shimmer);
      label.textContent='Задержка';
      counter.textContent=Math.ceil(anim.inhale+anim.hold-pos)+'с';
      applyTheme('hold');
    } else {
      const exPos=pos-anim.inhale-anim.hold;
      const progress=1-exPos/anim.exhale;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Выдох';
      counter.textContent=Math.ceil(anim.exhale-exPos)+'с';
      applyTheme('exhale');
    }
    mantra.textContent='';
  }
  else if(anim.type==='multipart'){
    const inhaleDur=anim.inhaleCount*anim.inhalePart;
    const cycle=inhaleDur+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<inhaleDur){
      const partIdx=Math.floor(pos/anim.inhalePart);
      const base=(partIdx)/anim.inhaleCount;
      const step=1/anim.inhaleCount;
      const partProgress=(pos%anim.inhalePart)/anim.inhalePart;
      const s=base+step*partProgress;
      setRingsNoTransition();
      setRingsScale(s);
      label.textContent='Вдох';
      counter.textContent=`${partIdx+1}/${anim.inhaleCount}`;
      applyTheme('inhale');
    } else {
      const exPos=pos-inhaleDur;
      const progress=1-exPos/anim.exhale;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Выдох';
      counter.textContent=Math.ceil(anim.exhale-exPos)+'с';
      applyTheme('exhale');
    }
    mantra.textContent='';
  }
  else if(anim.type==='mantra'){
    const beats=anim.beats;
    const totalCycle=beats.reduce((s,b)=>s+b.duration,0);
    const pos=elapsed%totalCycle;
    let acc=0;
    for(const beat of beats){
      if(pos<acc+beat.duration){
        const s=beat.scale==='inhale'?1.0:0.3;
        setRingsTransition(beat.duration*0.3);
        setRingsScale(s);
        label.textContent=beat.label;
        counter.textContent='';
        applyTheme(beat.scale==='inhale'?'inhale':'exhale');
        break;
      }
      acc+=beat.duration;
    }
    mantra.textContent='';
  }
  else if(anim.type==='mantraMulti'){
    const inhaleDur=anim.parts*anim.partDuration;
    const exhaleDur=anim.parts*anim.partDuration;
    const cycle=inhaleDur+exhaleDur;
    const pos=elapsed%cycle;
    if(pos<inhaleDur){
      const partIdx=Math.floor(pos/anim.partDuration);
      const progress=(partIdx+1)/anim.parts;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Вдох';
      mantra.textContent=anim.inhaleMantra;
      counter.textContent=`${partIdx+1}/${anim.parts}`;
      applyTheme('inhale');
    } else {
      const exPos=pos-inhaleDur;
      const partIdx=Math.floor(exPos/anim.partDuration);
      const progress=1-(partIdx+1)/anim.parts;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Выдох';
      mantra.textContent=anim.exhaleMantra;
      counter.textContent=`${partIdx+1}/${anim.parts}`;
      applyTheme('exhale');
    }
  }
  else if(anim.type==='fire'){
    const rate=2.5;
    const pos=elapsed*rate;
    const phase=pos%1;
    const s=phase<0.35?phase/0.35:1-(phase-0.35)/0.65;
    setRingsNoTransition();
    setRingsScale(s);
    label.textContent='🔥';
    mantra.textContent='';
    counter.textContent='';
    applyTheme('inhale');
  }

  animFrameId=requestAnimationFrame(runAnimation);
}

// ===== AUDIO =====
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playGong(){
  try{
    const ctx=getAudioCtx();
    if(ctx.state==='suspended') ctx.resume();

    const osc1=ctx.createOscillator();
    const gain1=ctx.createGain();
    osc1.type='sine';
    osc1.frequency.value=220;
    gain1.gain.setValueAtTime(0.3,ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+3);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start(ctx.currentTime);
    osc1.stop(ctx.currentTime+3);

    const osc2=ctx.createOscillator();
    const gain2=ctx.createGain();
    osc2.type='sine';
    osc2.frequency.value=440;
    gain2.gain.setValueAtTime(0.15,ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(ctx.currentTime);
    osc2.stop(ctx.currentTime+2);

    const osc3=ctx.createOscillator();
    const gain3=ctx.createGain();
    osc3.type='sine';
    osc3.frequency.value=660;
    gain3.gain.setValueAtTime(0.08,ctx.currentTime);
    gain3.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
    osc3.connect(gain3);
    gain3.connect(ctx.destination);
    osc3.start(ctx.currentTime);
    osc3.stop(ctx.currentTime+1.5);
  }catch(e){}
}

function vibrate(){
  try{
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
  }catch(e){}
}

// ===== WAKE LOCK =====
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null});
    }
  }catch(e){}
}

function releaseWakeLock(){
  try{
    if(wakeLock){wakeLock.release();wakeLock=null;}
  }catch(e){}
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&isRunning) requestWakeLock();
});

// ===== FULLSCREEN =====
function requestFullscreen(){
  try{
    const el=document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }catch(e){}
}

// ===== INIT =====
showMenu();
</script>
