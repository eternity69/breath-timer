<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;touch-action:manipulation;background:#F5F0E8}
body.no-scroll{overflow:hidden}
body{
  background:#F5F0E8;
  color:#fff;
  font-family:Georgia,'Times New Roman',serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  position:relative;isolation:isolate;
  user-select:none;-webkit-user-select:none;
  padding:0;
  transition:background-color 1s ease, color 0.8s ease;
}
#viewport-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:transparent;
  opacity:0;
}
#viewport-bg.wimhof-blue-bg{
  opacity:1;
  background-color:#071f63;
  background-image:
    radial-gradient(circle at 50% 38%, rgba(48,118,255,0.20) 0%, rgba(22,74,190,0.10) 26%, transparent 56%),
    linear-gradient(180deg, rgba(8,41,112,0.98) 0%, rgba(7,31,99,0.98) 52%, rgba(4,19,66,1) 100%);
  background-blend-mode:screen,normal;
  background-position:center center;
  background-repeat:no-repeat;
  background-size:cover;
}
#safe-area-bottom-fix{
  position:fixed;left:0;right:0;bottom:0;
  height:calc(env(safe-area-inset-bottom) + 14px);
  z-index:2;pointer-events:none;
  background:transparent;
  opacity:0;
}
#safe-area-bottom-fix.wimhof-blue-bg{
  opacity:1;
  background-color:#041342;
}

/* ===== MENU SCREEN ===== */
#menu-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:16px;width:100%;min-height:100%;
  padding:calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
  position:fixed;inset:0;z-index:10;
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
}
#menu-screen h1{
  font-family:Georgia,serif;
  font-size:2.4em;font-weight:400;
  color:#000000 !important;
  text-shadow:0 1px 2px rgba(0,0,0,0.1);
  text-align:center;letter-spacing:0.02em;
  flex-shrink:0;margin-top:16px;
}
#menu-screen .subtitle{color:#6b5a48;font-size:0.95em;font-style:italic;margin-bottom:8px;letter-spacing:0.5px;flex-shrink:0}

.menu-btn{
  width:min(88%,360px);padding:20px 24px;
  border:1.5px solid rgba(80,60,40,0.25);border-radius:20px;
  background:rgba(255,255,255,0.35);box-shadow:0 2px 8px rgba(0,0,0,0.06);
  color:rgba(255,255,255,0.9);font-family:Georgia,serif;font-size:1.1em;
  cursor:pointer;transition:all .3s;text-align:left;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.menu-btn:active,.menu-btn:hover{background:rgba(60,50,40,0.12);transform:scale(1.02)}
.menu-btn .btn-title{font-size:1.2em;font-weight:700;color:#2a1f14;margin-bottom:6px;letter-spacing:0.3px}
.menu-btn .btn-desc{font-size:0.85em;color:#5a4a3a;font-style:normal;letter-spacing:0.2px}

/* ===== PRACTICE SELECT ===== */
#practice-select{
  display:none;flex-direction:column;align-items:center;
  width:100%;height:100%;
  padding:calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
  position:fixed;inset:0;z-index:10;overflow-y:auto;
}
#practice-select h2{font-family:Georgia,serif;font-size:1.5em;font-weight:600;color:#1a1008;margin-bottom:16px;margin-top:10px}
.practice-list{width:min(95%,400px);display:flex;flex-direction:column;gap:6px;padding-bottom:30px}
.practice-item{
  padding:14px 18px;border:none;border-bottom:1px solid rgba(255,255,255,0.08);
  border-radius:0;background:transparent;
  cursor:pointer;transition:all .2s;
  display:flex;justify-content:space-between;align-items:center;
}
.practice-item:active{background:rgba(60,50,40,0.08)}
.practice-item .p-name{font-family:Georgia,serif;font-size:1em;color:#2a1f14}
.practice-item .p-time{font-family:Georgia,serif;font-size:0.85em;color:#7a6a58}
.back-btn{
  padding:10px 24px;border:1px solid rgba(60,50,40,0.2);border-radius:24px;
  background:transparent;color:#5a4a3a;
  font-family:Georgia,serif;font-size:1em;cursor:pointer;margin-top:12px;margin-bottom:10px;
}

/* ===== TIMER SCREEN ===== */
#timer-screen{
  display:none;flex-direction:column;align-items:center;justify-content:space-between;
  width:100%;height:100%;
  padding:calc(20px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
  position:fixed;inset:0;z-index:10;
  transition:background-color 1s ease;
}
.top-section{text-align:center;width:100%;flex-shrink:0;padding-top:8px}
.body-badge{
  display:inline-block;padding:3px 12px;border-radius:20px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:0.72em;
  background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.8);
  margin-bottom:6px;transition:background 0.8s,color 0.8s;
}
.body-badge.dark-text{background:rgba(0,0,0,0.08);color:rgba(60,50,40,0.6)}
.practice-name{
  font-family:Georgia,serif;font-size:1.3em;font-weight:400;
  color:#fff;line-height:1.3;min-height:1.6em;
  display:flex;align-items:center;justify-content:center;
  transition:color 0.8s;
}
.practice-hint{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:0.75em;color:rgba(255,255,255,0.5);margin-top:4px;min-height:1.2em;padding:0 10px;
  transition:color 0.8s;
}

/* ===== CONCENTRIC CIRCLES ===== */
.circles-container{
  position:relative;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;width:100%;flex:1;max-height:60vh;
}
.circle-ring{
  position:absolute;border-radius:50%;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1),height 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.8s,background-color 1s,box-shadow 1s;
}
.circle-ring-1{width:280px;height:280px;background:rgba(232,116,32,0.12);z-index:1}
.circle-ring-2{width:220px;height:220px;background:rgba(232,116,32,0.18);z-index:2}
.circle-ring-3{width:160px;height:160px;background:rgba(232,116,32,0.25);z-index:3}
.circle-ring-4{width:110px;height:110px;background:rgba(232,116,32,0.35);z-index:4}
.circle-content{
  position:relative;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
}
.breath-label{
  font-family:Georgia,serif;font-size:44px;font-weight:400;
  color:#fff;letter-spacing:0.04em;
  transition:color 0.8s;
}
.breath-mantra{font-family:Georgia,serif;font-size:1.2em;color:rgba(255,255,255,0.7);margin-top:4px;transition:color 0.8s}
.phase-counter{
  font-family:Georgia,serif;font-size:1.3em;
  color:rgba(255,255,255,0.95);margin-top:4px;
  font-weight:bold;
  text-shadow:0 1px 4px rgba(0,0,0,0.3);
  transition:color 0.8s;
}

/* ===== BOTTOM SECTION ===== */
.bottom-section{width:100%;text-align:center;flex-shrink:0}
.time-display{
  font-family:Georgia,serif;font-size:30px;font-weight:400;
  color:#fff;font-variant-numeric:tabular-nums;
  letter-spacing:3px;margin-bottom:16px;
  transition:color 0.8s;
}
.controls{display:flex;align-items:center;justify-content:center;gap:28px;margin-bottom:14px}
.ctrl-btn{
  width:52px;height:52px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);
  font-size:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s cubic-bezier(0.4,0,0.2,1),background-color 0.8s,color 0.8s;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn svg{width:22px;height:22px;fill:currentColor}
.ctrl-btn:active{transform:scale(0.85);opacity:0.6}
.ctrl-btn.main-btn{
  width:72px;height:72px;
  background:rgba(255,255,255,0.95);color:#222;
  box-shadow:0 4px 30px rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.1);
}
.ctrl-btn.main-btn svg{width:28px;height:28px}
.ctrl-btn.main-btn:active{transform:scale(0.88)}
.ctrl-btn.dark-bg{background:rgba(0,0,0,0.08);color:rgba(60,50,40,0.5)}
.ctrl-btn.main-btn.dark-bg{background:rgba(60,50,40,0.85);color:#F5F0E8;box-shadow:0 4px 30px rgba(0,0,0,0.1)}

.progress-bar-container{
  width:100%;height:3px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;margin-bottom:4px;
  transition:background-color 0.8s;
}
.progress-bar-container.dark-bg-bar{background:rgba(0,0,0,0.08)}
.progress-bar{
  height:100%;background:rgba(255,255,255,0.5);
  transition:width 0.5s ease,background-color 0.8s;
}
.progress-bar.dark-bar{background:rgba(80,70,50,0.3)}
.progress-text{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:0.7em;color:rgba(255,255,255,0.35);
  transition:color 0.8s;
}

/* ===== COMPLETION ===== */
#complete-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;width:100%;height:100%;
  padding:calc(20px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
  position:fixed;inset:0;z-index:10;
}
#complete-screen h2{font-family:Georgia,serif;font-size:2em;font-weight:400;color:#2a1f14}
#complete-screen .complete-emoji{font-size:4em}
#complete-screen .complete-time{font-family:Georgia,serif;color:#6b5a48;font-size:1.1em}

/* ===== DARK TEXT STATE (for cream bg) ===== */
.dark-text .practice-name,
.dark-text .breath-label{color:#3c3228 !important}
.dark-text .practice-hint{color:rgba(60,50,40,0.5) !important}
.dark-text .time-display{color:#3c3228 !important}
.dark-text .breath-mantra{color:rgba(60,50,40,0.6) !important}
.dark-text .phase-counter{color:rgba(60,50,40,0.9) !important;text-shadow:none}
.dark-text .progress-text{color:rgba(60,50,40,0.35) !important}

@media(min-height:700px){
  .circle-ring-1{width:320px;height:320px}
  .circle-ring-2{width:250px;height:250px}
  .circle-ring-3{width:185px;height:185px}
  .circle-ring-4{width:130px;height:130px}
  .breath-label{font-size:48px}
}
@media(min-height:800px){
  .circle-ring-1{width:360px;height:360px}
  .circle-ring-2{width:280px;height:280px}
  .circle-ring-3{width:210px;height:210px}
  .circle-ring-4{width:150px;height:150px}
}
@media(max-height:600px){
  .circle-ring-1{width:220px;height:220px}
  .circle-ring-2{width:170px;height:170px}
  .circle-ring-3{width:125px;height:125px}
  .circle-ring-4{width:85px;height:85px}
  .breath-label{font-size:36px}
  .time-display{font-size:26px}
}
</style>
</head>
<body>
<div id="viewport-bg" aria-hidden="true"></div>
<div id="safe-area-bottom-fix" aria-hidden="true"></div>

<!-- MENU -->
<div id="menu-screen">
  <h1>Breath Timer</h1>
  <div class="subtitle">дыхательные практики</div>
  <button class="menu-btn" onclick="startSequence('wim_hof_8')">
    <div class="btn-title">🧊 Вим Хоф — 8 раундов</div>
    <div class="btn-desc">35 дыханий → выдох → задержка → восстановительный вдох</div>
  </button>
  <button class="menu-btn" onclick="startSequence('hv_retention')">
    <div class="btn-title">🌪️ Гипервентиляция + задержка</div>
    <div class="btn-desc">Короткий протокол • 4 раунда • частое дыхание + паузы</div>
  </button>
  <button class="menu-btn" onclick="startSequence('co2_ladder')">
    <div class="btn-title">🫁 CO₂ Лестница</div>
    <div class="btn-desc">Носовое дыхание + мягкие задержки по нарастающей</div>
  </button>
  <button class="menu-btn" onclick="startSequence('bhastrika_intervals')">
    <div class="btn-title">🔥 Бхастрика интервалы</div>

  </button>
  <button class="menu-btn" onclick="startSequence('energy_basic')">
    <div class="btn-title">🔥 Энергодыхание — 33 мин</div>
    <div class="btn-desc">Карловский • 2 цикла связного дыхания + окна</div>
  </button>
  <button class="menu-btn" onclick="startSequence('energy_7phase')">
    <div class="btn-title">⚡ Энергодыхание по чакрам — 50 мин</div>

  <button class="menu-btn" onclick="startSequence('sat_kriya_full')">

  </button>

</div>

<!-- PRACTICE SELECT -->
<div id="practice-select">
  <button class="back-btn" onclick="showMenu()">← Назад</button>
  <h2>Выбери практику</h2>
  <div class="practice-list" id="practice-list"></div>
</div>

<!-- TIMER -->
<div id="timer-screen">
  <div class="top-section">
    <div class="body-badge" id="body-badge"></div>
    <div class="practice-name" id="practice-name"></div>
    <div class="practice-hint" id="practice-hint"></div>
  </div>

  <div class="circles-container" id="circles-container">
    <div class="circle-ring circle-ring-1" id="ring1"></div>
    <div class="circle-ring circle-ring-2" id="ring2"></div>
    <div class="circle-ring circle-ring-3" id="ring3"></div>
    <div class="circle-ring circle-ring-4" id="ring4"></div>
    <div class="circle-content">
      <div class="breath-label" id="breath-label"></div>
      <div class="breath-mantra" id="breath-mantra"></div>
      <div class="phase-counter" id="phase-counter"></div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="time-display" id="time-display">00:00</div>
    <div class="controls">
      <button class="ctrl-btn" id="btn-reset" onclick="resetAll()" title="Сначала"><svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
      <button class="ctrl-btn main-btn" id="play-btn" onclick="togglePlay()"><svg viewBox="0 0 24 24" id="play-icon"><polygon points="8,5 19,12 8,19"/></svg></button>
      <button class="ctrl-btn" id="btn-skip" onclick="skipPractice()" title="Пропустить"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg></button>
    </div>
    <div class="progress-bar-container" id="progress-bar-container">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</div>

<!-- COMPLETE -->
<div id="complete-screen">
  <div class="complete-emoji">🙏</div>
  <h2>Практика завершена</h2>
  <div class="complete-time" id="complete-time"></div>
  <button class="menu-btn" onclick="showMenu()" style="margin-top:20px;text-align:center">
    <div class="btn-title">← В меню</div>
  </button>
</div>

<script>
// ===== PRACTICES DATA =====
// Программа 1: «Прана + Мужская сила» — 40 дней без изменений
const ALL_PRACTICES = [
  {id:1,name:"Полное дыхание 5:5",duration:180,body:"Тело 8 ⭐",hint:"Вдох: живот → рёбра → грудь. Выдох обратно. Ритм 5:5, разогрев.",animation:{type:"simple",inhale:5,exhale:5}},
  {id:101,name:"Полное дыхание 6:6",duration:180,body:"Тело 8 ⭐",hint:"Замедляемся. Вдох 6 сек, выдох 6 сек. Глубже.",animation:{type:"simple",inhale:6,exhale:6}},
  {id:102,name:"Полное дыхание 7:7",duration:180,body:"Тело 8 ⭐",hint:"Ещё глубже. Вдох 7 сек, выдох 7 сек. Почувствуй поток.",animation:{type:"simple",inhale:7,exhale:7}},
  {id:103,name:"Полное дыхание 8:8",duration:120,body:"Тело 8 ⭐",hint:"Максимальная глубина. Вдох 8 сек, выдох 8 сек. Ты в потоке.",animation:{type:"simple",inhale:8,exhale:8}},
  {id:901,name:"— Пауза —",duration:60,body:"🔄",hint:"Свободное дыхание. Потянись, поправь позу. Подготовься к следующей практике.",animation:null},
  {id:2,name:"Нади Шодхана",duration:660,body:"Тело 8+9",hint:"Попеременное дыхание. Правая ноздря закрыта → вдох левой 4с → задержка 4с → выдох правой 4с.",animation:{type:"hold",inhale:4,hold:4,exhale:4}},
  {id:902,name:"— Пауза —",duration:60,body:"🔄",hint:"Свободное дыхание. Расслабь руки. Подготовься к Sat Kriya.",animation:null},
  {id:3,name:"Sat Kriya",duration:420,body:"Тело 8 ⭐",hint:"Руки вверх, ладони вместе. SAT — втяни пупок резко. NAM — отпусти. Ритм 1с+1с. Ojas вверх.",animation:{type:"mantra",beats:[{label:"SAT",duration:1,scale:"inhale"},{label:"NAM",duration:1,scale:"exhale"}]}},
  {id:903,name:"— Пауза —",duration:60,body:"🔄",hint:"Свободное дыхание. Ощути тепло в теле после Sat Kriya.",animation:null},
  {id:4,name:"SO HUNG",duration:420,body:"Тело 2",hint:"Ноги вытянуты, отклонись назад. Гьян Мудра. Вдох 4 части: SO-SO-SO-SO. Выдох 4 части: HUNG-HUNG-HUNG-HUNG.",animation:{type:"mantraMulti",inhaleMantra:"SO",exhaleMantra:"HUNG",parts:4,partDuration:1}},

  document.body.style.backgroundColor = enabled ? WIM_HOF_BG_COLOR : '#F5F0E8';
  document.documentElement.style.backgroundColor = enabled ? WIM_HOF_BG_COLOR : '#F5F0E8';
  document.body.style.backgroundImage = enabled ? WIM_HOF_BG_IMAGE : 'none';
  document.documentElement.style.backgroundImage = enabled ? WIM_HOF_BG_IMAGE : 'none';
  document.body.style.backgroundBlendMode = enabled ? 'screen,normal' : 'normal';
  document.documentElement.style.backgroundBlendMode = enabled ? 'screen,normal' : 'normal';
  document.body.style.backgroundRepeat = enabled ? 'no-repeat' : 'repeat';
  document.documentElement.style.backgroundRepeat = enabled ? 'no-repeat' : 'repeat';
  document.body.style.backgroundPosition = enabled ? 'center center' : 'initial';
  document.documentElement.style.backgroundPosition = enabled ? 'center center' : 'initial';
  document.body.style.backgroundSize = enabled ? 'cover' : 'auto';
  document.documentElement.style.backgroundSize = enabled ? 'cover' : 'auto';
  if (themeColorMeta) {
    themeColorMeta.setAttribute('content', enabled ? WIM_HOF_BG_COLOR : '#F5F0E8');
  }
}

// ===== THEME APPLICATION =====
function applyTheme(phase) {
  currentPhase = phase;
  const c = COLORS[phase] || COLORS.idle;
  const visualTheme = getCurrentVisualTheme();
  const isWimHofTheme = visualTheme === 'wimhof-blue';
  setBodyVisualTheme(visualTheme);
  const rootBg = isWimHofTheme ? WIM_HOF_BG_COLOR : c.bg;
  document.body.style.backgroundColor = rootBg;
  document.documentElement.style.backgroundColor = rootBg;
  timerScreen.style.backgroundColor = isWimHofTheme ? 'transparent' : c.bg;
  
  if (timerScreen.style.display !== 'none') {
    ring1.style.backgroundColor = c.ring1;
    ring2.style.backgroundColor = c.ring2;
    ring3.style.backgroundColor = c.ring3;
    ring4.style.backgroundColor = c.ring4;
  }
  
  const ts = document.getElementById('timer-screen');
  const badge = document.getElementById('body-badge');
  const btnReset = document.getElementById('btn-reset');
  const btnSkip = document.getElementById('btn-skip');
  const playBtn = document.getElementById('play-btn');
  const pbc = document.getElementById('progress-bar-container');
  const pb = document.getElementById('progress-bar');
  
  if (c.dark) {
    ts.classList.add('dark-text');
    badge.classList.add('dark-text');
    btnReset.classList.add('dark-bg');
    btnSkip.classList.add('dark-bg');
    playBtn.classList.add('dark-bg');
    
    pbc.classList.add('dark-bg-bar');
    pb.classList.add('dark-bar');
  } else {
    ts.classList.remove('dark-text');
    badge.classList.remove('dark-text');
    btnReset.classList.remove('dark-bg');
    btnSkip.classList.remove('dark-bg');
    playBtn.classList.remove('dark-bg');
    
    pbc.classList.remove('dark-bg-bar');
    pb.classList.remove('dark-bar');
  }
}

// ===== SCREENS =====
function hideAll(){
  menuScreen.style.display='none';
  practiceSelect.style.display='none';
  timerScreen.style.display='none';
  completeScreen.style.display='none';
}

function showMenu(){
  stopTimer();
  releaseWakeLock();
  hideAll();
  menuScreen.style.display='flex';
  menuScreen.style.backgroundColor = COLORS.menu.bg;
  setBodyVisualTheme('');
  document.body.style.backgroundColor = COLORS.menu.bg;
  document.documentElement.style.backgroundColor = COLORS.menu.bg;
  document.body.style.color = '#3c3228';
  document.body.classList.remove('no-scroll');
}

function showPracticeSelect(){
  hideAll();
  practiceSelect.style.display='flex';
  practiceSelect.style.backgroundColor = COLORS.menu.bg;
  setBodyVisualTheme('');
  document.body.style.backgroundColor = COLORS.menu.bg;
  document.documentElement.style.backgroundColor = COLORS.menu.bg;
  document.body.classList.remove('no-scroll');
  const list=document.getElementById('practice-list');
  list.innerHTML='';
  const allPractices = [...WIM_HOF_8, ...HV_RETENTION, ...CO2_LADDER, ...BHASTRIKA_INTERVALS, ...ENERGY_BASIC, ...ENERGY_7PHASE, ...SAT_KRIYA_FULL].filter(p=>!p.name.includes('Пауза')&&!p.name.includes('Переход'));
  allPractices.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='practice-item';
    el.innerHTML=`<span class="p-name">${p.name}</span><span class="p-time">${formatTime(p.duration)}</span>`;
    el.onclick=()=>{
      currentSequence=[{...p}];
      currentIndex=0;
      startTime=Date.now();
      hideAll();
      timerScreen.style.display='flex';
      document.body.classList.add('no-scroll');
      loadPractice();

}

// ===== START =====
function startSequence(type){
  if(type==='wim_hof_8'){
    currentSequence=[...WIM_HOF_8];
  } else if(type==='hv_retention'){
    currentSequence=[...HV_RETENTION];
  } else if(type==='co2_ladder'){
    currentSequence=[...CO2_LADDER];
  } else if(type==='bhastrika_intervals'){
    currentSequence=[...BHASTRIKA_INTERVALS];
  } else if(type==='energy_basic'){
    currentSequence=[...ENERGY_BASIC];
  } else if(type==='energy_7phase'){
    currentSequence=[...ENERGY_7PHASE];
  } else if(type==='sat_kriya_full'){
    currentSequence=[...SAT_KRIYA_FULL];
  } else {
    return;
  }
  currentIndex=0;
  startTime=Date.now();
  hideAll();
  timerScreen.style.display='flex';
  document.body.classList.add('no-scroll');
  loadPractice(0);
}

function startSingle(idx){
  currentSequence=[{...ALL_PRACTICES[idx]}];
  currentIndex=0;
  startTime=Date.now();
  hideAll();
  timerScreen.style.display='flex';
  document.body.classList.add('no-scroll');
  loadPractice(0);
}

// ===== LOAD PRACTICE =====
function loadPractice(idx){
  if(idx>=currentSequence.length){
    showComplete();
    return;
  }
  currentIndex=idx;
  const p=currentSequence[idx];
  timeLeft=p.duration;

  document.getElementById('practice-name').textContent=p.name;
  document.getElementById('practice-hint').textContent=p.hint||'';
  document.getElementById('body-badge').textContent=p.body||'';
  updateSkipButton(p);
  updateTimeDisplay();
  updateProgress();
  resetCircles();
  applyTheme('pause');

  if(idx>0){
    playGong();
    vibrate();
  }
}

function updateSkipButton(practice){
  const btnSkip = document.getElementById('btn-skip');
  if(practice && practice.manualAdvance){
    btnSkip.title='Дальше';
    btnSkip.innerHTML='<svg viewBox="0 0 24 24"><path d="M9 16.17l-3.88-3.88L4 13.41 9 18.41 20 7.41 18.59 6z"/></svg>';
  } else {
    btnSkip.title='Пропустить';
    btnSkip.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>';
  }
}

// ===== TIMER =====
function togglePlay(){
  if(isRunning){
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer(){
  isRunning=true;
  document.getElementById('play-icon').innerHTML='<rect x="7" y="5" width="3" height="14"/><rect x="14" y="5" width="3" height="14"/>';
  requestWakeLock();
  requestFullscreen();
  lastTick=Date.now();
  timerInterval=setInterval(tick,100);
  startAnimation();
}

let lastTick=0;
function tick(){
  const now=Date.now();
  const delta=(now-lastTick)/1000;
  lastTick=now;
  const p=currentSequence[currentIndex];
  timeLeft-=delta;
  if(timeLeft<=0){
    timeLeft=0;
    updateTimeDisplay();
    if(p && p.manualAdvance) return;
    nextPractice();
    return;
  }
  updateTimeDisplay();
}

function pauseTimer(){
  isRunning=false;
  document.getElementById('play-icon').innerHTML='<polygon points="8,5 19,12 8,19"/>';
  clearInterval(timerInterval);
  stopAnimation();
  applyTheme('pause');
}

function stopTimer(){
  isRunning=false;
  document.getElementById('play-icon').innerHTML='<polygon points="8,5 19,12 8,19"/>';
  clearInterval(timerInterval);
  stopAnimation();
}

function skipPractice(){
  stopTimer();
  nextPractice();
}

function prevPractice(){
  if(currentIndex<=0) return;
  stopTimer();
  currentIndex-=2;
  nextPractice();
}

function nextPractice(){
  stopTimer();
  if(currentIndex+1>=currentSequence.length){
    showComplete();
  } else {
    loadPractice(currentIndex+1);
    startTimer();
  }
}

function resetAll(){
  stopTimer();
  releaseWakeLock();
  showMenu();
}

function showComplete(){
  stopTimer();
  releaseWakeLock();
  hideAll();
  completeScreen.style.display='flex';
  completeScreen.style.backgroundColor = COLORS.menu.bg;
  setBodyVisualTheme('');
  document.body.style.backgroundColor = COLORS.menu.bg;
  document.documentElement.style.backgroundColor = COLORS.menu.bg;
  const elapsed=Math.round((Date.now()-startTime)/1000);
  document.getElementById('complete-time').textContent=`Время: ${formatTime(elapsed)}`;
  playGong();
  vibrate();
}

function updateTimeDisplay(){
  document.getElementById('time-display').textContent=formatTime(Math.ceil(timeLeft));
}

function updateProgress(){
  const total=currentSequence.length;
  const pct=total>0?(currentIndex/total)*100:0;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${currentIndex+1} / ${total}`;
}

function formatTime(s){
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

// ===== CIRCLE SIZES =====
// Base sizes (will be read from computed styles or set directly)
const BASE = {
  r1: {min:0.55, max:1.0},
  r2: {min:0.55, max:1.0},
  r3: {min:0.55, max:1.0},
  r4: {min:0.55, max:1.0}
};

function setRingsScale(scale, mode='default') {
  // scale: 0 = fully contracted, 1 = fully expanded
  if(mode==='wimhof'){
    const s = 0.08 + 2.1 * scale;
    ring1.style.transform = 'scale(0.08)';
    ring2.style.transform = 'scale(0.08)';
    ring3.style.transform = 'scale(0.08)';
    ring4.style.transform = `scale(${s})`;

    ring1.style.opacity = '0';
    ring2.style.opacity = '0';
    ring3.style.opacity = '0';
    ring4.style.opacity = String(0.88 + 0.12 * scale);
    return;
  }

  const s = 0.55 + 0.45 * scale;
  ring1.style.transform = `scale(${s * 0.95})`;
  ring2.style.transform = `scale(${s * 0.97})`;
  ring3.style.transform = `scale(${s * 0.99})`;
  ring4.style.transform = `scale(${s})`;
  ring1.style.opacity = '1';
  ring2.style.opacity = '1';
  ring3.style.opacity = '1';
  ring4.style.opacity = '1';
}

function applyVisualModeAppearance(mode='default', phase='idle') {
  if(mode==='wimhof'){
    ring1.style.boxShadow = 'none';
    ring2.style.boxShadow = 'none';
    ring3.style.boxShadow = 'none';

    ring4.style.backgroundColor = 'rgba(255, 154, 48, 0.99)';
    ring4.style.boxShadow = '0 0 34px rgba(255, 154, 48, 0.28), 0 0 12px rgba(255, 214, 148, 0.28) inset';
    return;
  }

  ring1.style.boxShadow = 'none';
  ring2.style.boxShadow = 'none';
  ring3.style.boxShadow = 'none';
  ring4.style.boxShadow = 'none';
}

function setRingsTransition(dur) {
  const t = `transform ${dur}s cubic-bezier(0.4,0,0.2,1)`;
  ring1.style.transition = `${t}, background-color 1s`;
  ring2.style.transition = `${t}, background-color 1s`;
  ring3.style.transition = `${t}, background-color 1s`;
  ring4.style.transition = `${t}, background-color 1s`;
}

function setRingsNoTransition() {
  ring1.style.transition = 'background-color 1s';
  ring2.style.transition = 'background-color 1s';
  ring3.style.transition = 'background-color 1s';
  ring4.style.transition = 'background-color 1s';
}

function resetCircles(){
  setRingsNoTransition();
  setRingsScale(0.3);
  applyVisualModeAppearance('default');
  document.getElementById('breath-label').textContent='';
  document.getElementById('breath-mantra').textContent='';
  document.getElementById('phase-counter').textContent='';
}

// ===== ANIMATION =====
let animStartTime=0;

function startAnimation(){
  animStartTime=Date.now();
  stopAnimation();
  runAnimation();
}

function stopAnimation(){
  if(animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId=null;
}

function runAnimation(){
  if(!isRunning) return;
  const p=currentSequence[currentIndex];
  const anim=p.animation;
  const label=document.getElementById('breath-label');
  const mantra=document.getElementById('breath-mantra');
  const counter=document.getElementById('phase-counter');
  const hidePhaseSeconds = (p?.visualTheme === 'wimhof-blue') || (anim?.visualMode === 'wimhof');

  if(!anim){
    // No animation — gentle pulse, use inhale color
    const t=(Date.now()-animStartTime)/1000;
    const s=0.35+0.08*Math.sin(t*0.8);
    setRingsNoTransition();
    setRingsScale(s);
    label.textContent='🧘';
    mantra.textContent='';
    counter.textContent='';
    applyTheme('inhale');
    animFrameId=requestAnimationFrame(runAnimation);
    return;
  }

  const elapsed=(Date.now()-animStartTime)/1000;

  if(anim.type==='simple'){
    const cycle=anim.inhale+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<anim.inhale){
      const progress=pos/anim.inhale;
      setRingsNoTransition();
      setRingsScale(progress, anim.visualMode);
      label.textContent=anim.inhaleLabel||'Вдох';
      counter.textContent=hidePhaseSeconds?'':Math.ceil(anim.inhale-pos)+'с';
      applyTheme('inhale');
      applyVisualModeAppearance(anim.visualMode, 'inhale');
    } else {
      const exPos=pos-anim.inhale;
      const progress=1-exPos/anim.exhale;
      setRingsNoTransition();
      setRingsScale(progress, anim.visualMode);
      label.textContent=anim.exhaleLabel||'Выдох';
      counter.textContent=hidePhaseSeconds?'':Math.ceil(anim.exhale-exPos)+'с';
      applyTheme('exhale');
      applyVisualModeAppearance(anim.visualMode, 'exhale');
    }
    mantra.textContent='';
  }
  else if(anim.type==='hold'){
    const cycle=anim.inhale+anim.hold+anim.exhale;
    const practice=currentSequence[currentIndex]||{};
    const isManualHold=!!practice.manualAdvance;
    const totalHoldPoint=anim.inhale+anim.hold;
    const pos=(isManualHold&&cycle>0)?Math.min(elapsed,cycle):(cycle>0?elapsed%cycle:0);
    if(anim.inhale>0 && pos<anim.inhale){
      const progress=pos/anim.inhale;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Вдох';
      counter.textContent=hidePhaseSeconds?'':Math.ceil(anim.inhale-pos)+'с';
      applyTheme('inhale');
    } else if(pos<anim.inhale+anim.hold || anim.exhale===0){
      // Hold — static with subtle shimmer
      const holdElapsed=Math.max(0,pos-anim.inhale);
      const shimmer=1.0+0.02*Math.sin(holdElapsed*3);
      setRingsNoTransition();
      setRingsScale(shimmer);
      label.textContent='Задержка';
      if(isManualHold && elapsed>totalHoldPoint){
        counter.textContent='+'+formatTime(Math.floor(elapsed-totalHoldPoint));
      } else {
        counter.textContent=Math.ceil(anim.inhale+anim.hold-pos)+'с';
      }
      applyTheme('hold');
    } else {
      const exPos=pos-anim.inhale-anim.hold;
      const progress=anim.exhale>0?1-exPos/anim.exhale:0;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Выдох';
      counter.textContent=hidePhaseSeconds?'':(anim.exhale>0?Math.ceil(anim.exhale-exPos)+'с':'');
      applyTheme('exhale');
    }
    mantra.textContent='';
  }
  else if(anim.type==='multipart'){
    const inhaleDur=anim.inhaleCount*anim.inhalePart;
    const cycle=inhaleDur+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<inhaleDur){
      const partIdx=Math.floor(pos/anim.inhalePart);
      const base=(partIdx)/anim.inhaleCount;
      const step=1/anim.inhaleCount;
      const partProgress=(pos%anim.inhalePart)/anim.inhalePart;
      const s=base+step*partProgress;
      setRingsNoTransition();
      setRingsScale(s);
      label.textContent='Вдох';
      counter.textContent=`${partIdx+1}/${anim.inhaleCount}`;
      applyTheme('inhale');
    } else {
      const exPos=pos-inhaleDur;
      const progress=1-exPos/anim.exhale;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Выдох';
      counter.textContent=Math.ceil(anim.exhale-exPos)+'с';
      applyTheme('exhale');
    }
    mantra.textContent='';
  }
  else if(anim.type==='mantra'){
    const beats=anim.beats;
    const totalCycle=beats.reduce((s,b)=>s+b.duration,0);
    const pos=elapsed%totalCycle;
    let acc=0;
    for(const beat of beats){
      if(pos<acc+beat.duration){
        const s=beat.scale==='inhale'?1.0:0.3;
        setRingsTransition(beat.duration*0.3);
        setRingsScale(s);
        label.textContent=beat.label;
        counter.textContent='';
        applyTheme(beat.scale==='inhale'?'inhale':'exhale');
        break;
      }
      acc+=beat.duration;
    }
    mantra.textContent='';
  }
  else if(anim.type==='mantraMulti'){
    const inhaleDur=anim.parts*anim.partDuration;
    const exhaleDur=anim.parts*anim.partDuration;
    const cycle=inhaleDur+exhaleDur;
    const pos=elapsed%cycle;
    if(pos<inhaleDur){
      const partIdx=Math.floor(pos/anim.partDuration);
      const progress=(partIdx+1)/anim.parts;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Вдох';
      mantra.textContent=anim.inhaleMantra;
      counter.textContent=`${partIdx+1}/${anim.parts}`;
      applyTheme('inhale');
    } else {
      const exPos=pos-inhaleDur;
      const partIdx=Math.floor(exPos/anim.partDuration);
      const progress=1-(partIdx+1)/anim.parts;
      setRingsNoTransition();
      setRingsScale(progress);
      label.textContent='Выдох';
      mantra.textContent=anim.exhaleMantra;
      counter.textContent=`${partIdx+1}/${anim.parts}`;
      applyTheme('exhale');
    }
  }
  else if(anim.type==='fire'){
    const rate=2.5;
    const pos=elapsed*rate;
    const phase=pos%1;
    const s=phase<0.35?phase/0.35:1-(phase-0.35)/0.65;
    setRingsNoTransition();
    setRingsScale(s);
    label.textContent='🔥';
    mantra.textContent='';
    counter.textContent='';
    applyTheme('inhale');
  }

  animFrameId=requestAnimationFrame(runAnimation);
}

// ===== AUDIO =====
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playGong(){
  try{
    const ctx=getAudioCtx();
    if(ctx.state==='suspended') ctx.resume();

    const osc1=ctx.createOscillator();
    const gain1=ctx.createGain();
    osc1.type='sine';
    osc1.frequency.value=220;
    gain1.gain.setValueAtTime(0.3,ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+3);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start(ctx.currentTime);
    osc1.stop(ctx.currentTime+3);

    const osc2=ctx.createOscillator();
    const gain2=ctx.createGain();
    osc2.type='sine';
    osc2.frequency.value=440;
    gain2.gain.setValueAtTime(0.15,ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(ctx.currentTime);
    osc2.stop(ctx.currentTime+2);

    const osc3=ctx.createOscillator();
    const gain3=ctx.createGain();
    osc3.type='sine';
    osc3.frequency.value=660;
    gain3.gain.setValueAtTime(0.08,ctx.currentTime);
    gain3.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
    osc3.connect(gain3);
    gain3.connect(ctx.destination);
    osc3.start(ctx.currentTime);
    osc3.stop(ctx.currentTime+1.5);
  }catch(e){}
}

function vibrate(){
  try{
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
  }catch(e){}
}

// ===== WAKE LOCK =====
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null});
    }
  }catch(e){}
}

function releaseWakeLock(){
  try{
    if(wakeLock){wakeLock.release();wakeLock=null;}
  }catch(e){}
}

// ===== APP UPDATE CHECK =====
async function checkForAppUpdate(force=false){
  const now = Date.now();
  if(updateCheckInFlight) return updateCheckInFlight;
  if(!force && now-lastUpdateCheckAt<15000) return;

  lastUpdateCheckAt = now;
  updateCheckInFlight = (async()=>{
    try{
      const res = await fetch(`./index.html?updateCheck=${now}`, {
        method:'HEAD',
        cache:'no-store'
      });

      if(!res.ok) return;

      const remoteToken = (res.headers.get('etag') || res.headers.get('last-modified') || '').trim();
      if(!remoteToken) return;

      const storedToken = localStorage.getItem(BUILD_STORAGE_KEY);
      if(!storedToken){
        localStorage.setItem(BUILD_STORAGE_KEY, remoteToken);
        return;
      }

      if(storedToken !== remoteToken){
        localStorage.setItem(BUILD_STORAGE_KEY, remoteToken);
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set('v', String(now));
        window.location.replace(nextUrl.toString());
      }
    }catch(e){}
    finally{updateCheckInFlight=null;}
  })();

  return updateCheckInFlight;
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    if(isRunning) requestWakeLock();
    checkForAppUpdate(true);
  }
});

window.addEventListener('pageshow',()=>{
  checkForAppUpdate(true);
});

// ===== FULLSCREEN =====
function requestFullscreen(){
  try{
    const el=document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }catch(e){}
}

// ===== INIT =====
showMenu();
checkForAppUpdate(true);
setInterval(()=>{
  if(document.visibilityState==='visible') checkForAppUpdate();
}, UPDATE_CHECK_INTERVAL_MS);
