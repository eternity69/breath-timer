<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08081a">
<title>🌬️ Breath Timer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Breath%20Timer%22%2C%22short_name%22%3A%22Breath%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2308081a%22%2C%22theme_color%22%3A%22%2308081a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%253E%253Ctext%20y%3D'.9em'%20font-size%3D'90'%253E%25F0%259F%258C%25AC%25EF%25B8%258F%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{background:#08081a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;user-select:none;-webkit-user-select:none;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ===== MENU SCREEN ===== */
#menu-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;width:100%;height:100%;padding:20px;position:absolute;top:0;left:0;z-index:10}
#menu-screen h1{font-size:2.2em;background:linear-gradient(135deg,#2dd4bf,#d4a017);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
#menu-screen .subtitle{color:#888;font-size:0.95em;margin-bottom:10px}
.menu-btn{width:min(90%,360px);padding:18px 24px;border:2px solid rgba(45,212,191,0.3);border-radius:16px;background:rgba(45,212,191,0.08);color:#e0e0e0;font-size:1.15em;cursor:pointer;transition:all .3s;text-align:left}
.menu-btn:active,.menu-btn:hover{background:rgba(45,212,191,0.2);border-color:rgba(45,212,191,0.6);transform:scale(1.02)}
.menu-btn .btn-title{font-size:1.1em;font-weight:600;margin-bottom:4px}
.menu-btn .btn-desc{font-size:0.8em;color:#888}
.menu-btn-single{border-color:rgba(212,160,23,0.3);background:rgba(212,160,23,0.08)}
.menu-btn-single:active,.menu-btn-single:hover{background:rgba(212,160,23,0.2);border-color:rgba(212,160,23,0.6)}

/* ===== PRACTICE SELECT ===== */
#practice-select{display:none;flex-direction:column;align-items:center;width:100%;height:100%;padding:20px;position:absolute;top:0;left:0;z-index:10;overflow-y:auto}
#practice-select h2{font-size:1.5em;color:#2dd4bf;margin-bottom:16px;margin-top:10px}
.practice-list{width:min(95%,400px);display:flex;flex-direction:column;gap:8px;padding-bottom:30px}
.practice-item{padding:14px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:12px;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.practice-item:active{background:rgba(45,212,191,0.15);transform:scale(0.98)}
.practice-item .p-name{font-size:1em}
.practice-item .p-time{font-size:0.85em;color:#888}
.back-btn{padding:10px 20px;border:1px solid rgba(255,255,255,0.2);border-radius:10px;background:transparent;color:#e0e0e0;font-size:1em;cursor:pointer;margin-top:12px;margin-bottom:10px}

/* ===== TIMER SCREEN ===== */
#timer-screen{display:none;flex-direction:column;align-items:center;justify-content:space-between;width:100%;height:100%;padding:20px 16px;position:absolute;top:0;left:0}
.top-section{text-align:center;width:100%;flex-shrink:0}
.body-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:0.8em;background:rgba(45,212,191,0.15);color:#2dd4bf;margin-bottom:8px}
.practice-name{font-size:1.6em;font-weight:700;color:#fff;line-height:1.2;min-height:2.4em;display:flex;align-items:center;justify-content:center}
.practice-hint{font-size:0.82em;color:#888;margin-top:4px;min-height:1.2em;padding:0 10px}

/* ===== BREATH CIRCLE ===== */
.circle-container{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.breath-circle{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(45,212,191,0.5),rgba(212,160,23,0.3));box-shadow:0 0 60px rgba(45,212,191,0.2),inset 0 0 40px rgba(45,212,191,0.1);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);transform:scale(0.6)}
.breath-circle.inhale{transform:scale(1)}
.breath-circle.hold{transform:scale(1)}
.breath-circle.exhale{transform:scale(0.6)}
.breath-circle.pulse-in{transform:scale(0.85)}
.breath-circle.pulse-out{transform:scale(0.6)}
.breath-circle.idle{transform:scale(0.75)}
.breath-label{font-size:1.6em;font-weight:700;color:#fff;text-transform:uppercase;text-shadow:0 0 20px rgba(45,212,191,0.5)}
.breath-mantra{font-size:1.1em;color:rgba(255,255,255,0.7);margin-top:4px}
.phase-counter{font-size:0.85em;color:rgba(255,255,255,0.5);margin-top:2px}

/* ===== BOTTOM SECTION ===== */
.bottom-section{width:100%;text-align:center;flex-shrink:0}
.time-display{font-size:3.5em;font-weight:200;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:2px;margin-bottom:12px}
.controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.ctrl-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#e0e0e0;font-size:1.4em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ctrl-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.15)}
.ctrl-btn.main-btn{width:72px;height:72px;border-color:rgba(45,212,191,0.5);background:rgba(45,212,191,0.15);font-size:1.8em}
.ctrl-btn.main-btn:active{background:rgba(45,212,191,0.3)}
.progress-bar-container{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-bar{height:100%;background:linear-gradient(90deg,#2dd4bf,#d4a017);border-radius:3px;transition:width 0.5s ease}
.progress-text{font-size:0.75em;color:#666}

/* ===== COMPLETION ===== */
#complete-screen{display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;width:100%;height:100%;position:absolute;top:0;left:0;z-index:10}
#complete-screen h2{font-size:2em;background:linear-gradient(135deg,#2dd4bf,#d4a017);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#complete-screen .complete-emoji{font-size:4em}
#complete-screen .complete-time{color:#888;font-size:1.1em}

@media(min-height:700px){
  .breath-circle{width:240px;height:240px}
  .practice-name{font-size:1.8em}
}
@media(min-height:800px){
  .breath-circle{width:260px;height:260px}
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen">
  <h1>🌬️ Breath Timer</h1>
  <div class="subtitle">Дыхательные практики</div>
  <button class="menu-btn" onclick="startSequence('morning')">
    <div class="btn-title">☀️ Утро — 60 мин</div>
    <div class="btn-desc">18 практик • Полная последовательность</div>
  </button>
  <button class="menu-btn" onclick="startSequence('evening')">
    <div class="btn-title">🌙 Вечер — 15 мин</div>
    <div class="btn-desc">Расслабление • Подготовка ко сну</div>
  </button>
  <button class="menu-btn menu-btn-single" onclick="showPracticeSelect()">
    <div class="btn-title">🎯 Отдельная практика</div>
    <div class="btn-desc">Выбери одну практику</div>
  </button>
</div>

<!-- PRACTICE SELECT -->
<div id="practice-select">
  <button class="back-btn" onclick="showMenu()">← Назад</button>
  <h2>Выбери практику</h2>
  <div class="practice-list" id="practice-list"></div>
</div>

<!-- TIMER -->
<div id="timer-screen">
  <div class="top-section">
    <div class="body-badge" id="body-badge"></div>
    <div class="practice-name" id="practice-name"></div>
    <div class="practice-hint" id="practice-hint"></div>
  </div>
  <div class="circle-container">
    <div class="breath-circle idle" id="breath-circle">
      <div class="breath-label" id="breath-label"></div>
      <div class="breath-mantra" id="breath-mantra"></div>
      <div class="phase-counter" id="phase-counter"></div>
    </div>
  </div>
  <div class="bottom-section">
    <div class="time-display" id="time-display">00:00</div>
    <div class="controls">
      <button class="ctrl-btn" onclick="resetAll()" title="Сначала">🔄</button>
      <button class="ctrl-btn main-btn" id="play-btn" onclick="togglePlay()">▶️</button>
      <button class="ctrl-btn" onclick="skipPractice()" title="Пропустить">⏭️</button>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</div>

<!-- COMPLETE -->
<div id="complete-screen">
  <div class="complete-emoji">🙏</div>
  <h2>Практика завершена</h2>
  <div class="complete-time" id="complete-time"></div>
  <button class="menu-btn" onclick="showMenu()" style="margin-top:20px">
    <div class="btn-title">← В меню</div>
  </button>
</div>

<script>
// ===== PRACTICES DATA =====
const ALL_PRACTICES = [
  {id:0,name:"Джала Нети",duration:300,body:"Тело 8 ⭐",hint:"Промывание носа солёной водой. Наклони голову, дыши ртом.",animation:null},
  {id:1,name:"Adi Mantra ONG NAMO",duration:180,body:"Тело 8 ⭐",hint:"Пой ONG NAMO GURU DEV NAMO. Настройка на практику.",animation:null},
  {id:2,name:"Полное йоговское дыхание",duration:300,body:"Тело 2",hint:"Вдох: живот → рёбра → грудь. Выдох обратно.",animation:{type:"simple",inhale:7.5,exhale:7.5}},
  {id:3,name:"Нади Шодхана 4:4:4",duration:300,body:"Тело 2",hint:"Попеременное дыхание через ноздри. Баланс каналов.",animation:{type:"hold",inhale:4,hold:4,exhale:4}},
  {id:4,name:"8-Stroke Breath",duration:180,body:"Тело 7",hint:"Вдох в 8 коротких частей через нос, выдох одним потоком.",animation:{type:"multipart",inhaleCount:8,inhalePart:0.5,exhale:2}},
  {id:5,name:"Уджайи 1:2",duration:300,body:"Тело 2",hint:"Дыхание океана. Сужение горла. Вдох 4с, выдох 8с.",animation:{type:"simple",inhale:4,exhale:8}},
  {id:6,name:"Sat Kriya SAT NAM",duration:180,body:"Тело 9",hint:"SAT — втяни пупок. NAM — отпусти. Ритм 1с+1с.",animation:{type:"mantra",beats:[{label:"SAT",duration:1,scale:"inhale"},{label:"NAM",duration:1,scale:"exhale"}]}},
  {id:7,name:"One-Minute Breath",duration:180,body:"Тело 7",hint:"Вдох 20с → Задержка 20с → Выдох 20с. Глубокое замедление.",animation:{type:"hold",inhale:20,hold:20,exhale:20}},
  {id:8,name:"Дыхание Огня",duration:180,body:"Тело 9",hint:"Быстрые ритмичные выдохи через нос. Пупок пульсирует.",animation:{type:"fire"}},
  {id:9,name:"Помпа пупка",duration:120,body:"Тело 9",hint:"Вдох — расслабь живот. Резкий выдох — пупок к позвоночнику.",animation:null},
  {id:10,name:"Ситали",duration:120,body:"Тело 2",hint:"Вдох через свёрнутый язык (рот). Выдох через нос.",animation:{type:"simple",inhale:4,exhale:4,inhaleLabel:"ВДОХ РТОМ",exhaleLabel:"ВЫДОХ НОСОМ"}},
  {id:11,name:"Энергодыхание Окно",duration:180,body:"Тело 7",hint:"Визуализируй поток энергии. Свободное глубокое дыхание.",animation:null},
  {id:12,name:"SO HUNG",duration:180,body:"Тело 8 ⭐",hint:"SO на вдохе (4 части). HUNG на выдохе (4 части).",animation:{type:"mantraMulti",inhaleMantra:"SO",exhaleMantra:"HUNG",parts:4,partDuration:1}},
  {id:13,name:"Дыхание 4:1",duration:180,body:"Тело 7",hint:"Вдох в 4 части через нос. Выдох одним потоком.",animation:{type:"multipart",inhaleCount:4,inhalePart:1,exhale:2}},
  {id:14,name:"Левая ноздря",duration:120,body:"Тело 2",hint:"Закрой правую ноздрю. Дыши только левой. Успокоение.",animation:{type:"simple",inhale:5,exhale:5}},
  {id:15,name:"Сублимация",duration:120,body:"Тело 9",hint:"Направь энергию вверх по позвоночнику. Глубокое дыхание.",animation:null},
  {id:16,name:"Шавасана",duration:420,body:"Тело 7",hint:"Полное расслабление. Лёжа на спине. Отпусти всё.",animation:null},
  {id:17,name:"SAT NAM завершение",duration:180,body:"Тело 8 ⭐",hint:"Глубокий вдох → длинное SAT... короткое NAM. Закрытие.",animation:{type:"mantra",beats:[{label:"SAT",duration:6,scale:"inhale"},{label:"NAM",duration:1,scale:"exhale"},{label:"...",duration:1,scale:"exhale"}]}}
];

const EVENING_INDICES = [2,5,14,16]; // Полное йоговское, Уджайи, Левая ноздря, Шавасана

// ===== STATE =====
let currentSequence = [];
let currentIndex = 0;
let timeLeft = 0;
let isRunning = false;
let timerInterval = null;
let animFrameId = null;
let wakeLock = null;
let audioCtx = null;
let startTime = 0;

// ===== SCREENS =====
const menuScreen = document.getElementById('menu-screen');
const practiceSelect = document.getElementById('practice-select');
const timerScreen = document.getElementById('timer-screen');
const completeScreen = document.getElementById('complete-screen');

function hideAll(){
  menuScreen.style.display='none';
  practiceSelect.style.display='none';
  timerScreen.style.display='none';
  completeScreen.style.display='none';
}

function showMenu(){
  stopTimer();
  releaseWakeLock();
  hideAll();
  menuScreen.style.display='flex';
}

function showPracticeSelect(){
  hideAll();
  practiceSelect.style.display='flex';
  const list=document.getElementById('practice-list');
  list.innerHTML='';
  ALL_PRACTICES.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='practice-item';
    el.innerHTML=`<span class="p-name">${p.name}</span><span class="p-time">${formatTime(p.duration)}</span>`;
    el.onclick=()=>startSingle(i);
    list.appendChild(el);
  });
}

// ===== START =====
function startSequence(type){
  if(type==='morning'){
    currentSequence=[...ALL_PRACTICES];
  } else {
    currentSequence=EVENING_INDICES.map(i=>({...ALL_PRACTICES[i]}));
  }
  currentIndex=0;
  startTime=Date.now();
  hideAll();
  timerScreen.style.display='flex';
  loadPractice(0);
}

function startSingle(idx){
  currentSequence=[{...ALL_PRACTICES[idx]}];
  currentIndex=0;
  startTime=Date.now();
  hideAll();
  timerScreen.style.display='flex';
  loadPractice(0);
}

// ===== LOAD PRACTICE =====
function loadPractice(idx){
  if(idx>=currentSequence.length){
    showComplete();
    return;
  }
  currentIndex=idx;
  const p=currentSequence[idx];
  timeLeft=p.duration;

  document.getElementById('practice-name').textContent=p.name;
  document.getElementById('practice-hint').textContent=p.hint||'';
  document.getElementById('body-badge').textContent=p.body||'';
  updateTimeDisplay();
  updateProgress();
  resetCircle();

  if(idx>0){
    playGong();
    vibrate();
  }
}

// ===== TIMER =====
function togglePlay(){
  if(isRunning){
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer(){
  isRunning=true;
  document.getElementById('play-btn').textContent='⏸️';
  requestWakeLock();
  requestFullscreen();
  lastTick=Date.now();
  timerInterval=setInterval(tick,100);
  startAnimation();
}

let lastTick=0;
function tick(){
  const now=Date.now();
  const delta=(now-lastTick)/1000;
  lastTick=now;
  timeLeft-=delta;
  if(timeLeft<=0){
    timeLeft=0;
    updateTimeDisplay();
    nextPractice();
    return;
  }
  updateTimeDisplay();
}

function pauseTimer(){
  isRunning=false;
  document.getElementById('play-btn').textContent='▶️';
  clearInterval(timerInterval);
  stopAnimation();
}

function stopTimer(){
  isRunning=false;
  document.getElementById('play-btn').textContent='▶️';
  clearInterval(timerInterval);
  stopAnimation();
}

function skipPractice(){
  stopTimer();
  nextPractice();
}

function nextPractice(){
  stopTimer();
  if(currentIndex+1>=currentSequence.length){
    showComplete();
  } else {
    loadPractice(currentIndex+1);
    startTimer();
  }
}

function resetAll(){
  stopTimer();
  releaseWakeLock();
  showMenu();
}

function showComplete(){
  stopTimer();
  releaseWakeLock();
  hideAll();
  completeScreen.style.display='flex';
  const elapsed=Math.round((Date.now()-startTime)/1000);
  document.getElementById('complete-time').textContent=`Время: ${formatTime(elapsed)}`;
  playGong();
  vibrate();
}

function updateTimeDisplay(){
  document.getElementById('time-display').textContent=formatTime(Math.ceil(timeLeft));
}

function updateProgress(){
  const total=currentSequence.length;
  const pct=total>0?(currentIndex/total)*100:0;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${currentIndex+1} / ${total}`;
}

function formatTime(s){
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

// ===== ANIMATION =====
let animStartTime=0;

function resetCircle(){
  const c=document.getElementById('breath-circle');
  c.className='breath-circle idle';
  c.style.transition='none';
  document.getElementById('breath-label').textContent='';
  document.getElementById('breath-mantra').textContent='';
  document.getElementById('phase-counter').textContent='';
}

function startAnimation(){
  animStartTime=Date.now();
  stopAnimation();
  runAnimation();
}

function stopAnimation(){
  if(animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId=null;
}

function runAnimation(){
  if(!isRunning) return;
  const p=currentSequence[currentIndex];
  const anim=p.animation;
  const circle=document.getElementById('breath-circle');
  const label=document.getElementById('breath-label');
  const mantra=document.getElementById('breath-mantra');
  const counter=document.getElementById('phase-counter');

  if(!anim){
    circle.className='breath-circle idle';
    circle.style.transition='transform 2s ease-in-out';
    label.textContent='🧘';
    mantra.textContent='';
    counter.textContent='';
    // gentle pulse for non-animated
    const t=(Date.now()-animStartTime)/1000;
    const s=0.7+0.05*Math.sin(t*0.8);
    circle.style.transform=`scale(${s})`;
    circle.style.transition='none';
    animFrameId=requestAnimationFrame(runAnimation);
    return;
  }

  const elapsed=(Date.now()-animStartTime)/1000;

  if(anim.type==='simple'){
    const cycle=anim.inhale+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<anim.inhale){
      const progress=pos/anim.inhale;
      const s=0.55+0.5*progress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent=anim.inhaleLabel||'ВДОХ';
      counter.textContent=Math.ceil(anim.inhale-pos)+'с';
    } else {
      const exPos=pos-anim.inhale;
      const progress=exPos/anim.exhale;
      const s=1.05-0.5*progress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent=anim.exhaleLabel||'ВЫДОХ';
      counter.textContent=Math.ceil(anim.exhale-exPos)+'с';
    }
    mantra.textContent='';
  }
  else if(anim.type==='hold'){
    const cycle=anim.inhale+anim.hold+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<anim.inhale){
      const progress=pos/anim.inhale;
      const s=0.55+0.5*progress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent='ВДОХ';
      counter.textContent=Math.ceil(anim.inhale-pos)+'с';
    } else if(pos<anim.inhale+anim.hold){
      circle.style.transition='none';
      circle.style.transform='scale(1.05)';
      label.textContent='ЗАДЕРЖКА';
      counter.textContent=Math.ceil(anim.inhale+anim.hold-pos)+'с';
    } else {
      const exPos=pos-anim.inhale-anim.hold;
      const progress=exPos/anim.exhale;
      const s=1.05-0.5*progress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent='ВЫДОХ';
      counter.textContent=Math.ceil(anim.exhale-exPos)+'с';
    }
    mantra.textContent='';
  }
  else if(anim.type==='multipart'){
    const inhaleDur=anim.inhaleCount*anim.inhalePart;
    const cycle=inhaleDur+anim.exhale;
    const pos=elapsed%cycle;
    if(pos<inhaleDur){
      const partIdx=Math.floor(pos/anim.inhalePart);
      const progress=(partIdx+1)/anim.inhaleCount;
      const partProgress=(pos%anim.inhalePart)/anim.inhalePart;
      const base=0.55+0.45*((partIdx)/anim.inhaleCount);
      const step=0.45/anim.inhaleCount;
      const s=base+step*partProgress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent='ВДОХ';
      counter.textContent=`${partIdx+1}/${anim.inhaleCount}`;
    } else {
      const exPos=pos-inhaleDur;
      const progress=exPos/anim.exhale;
      const s=1.0-0.45*progress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent='ВЫДОХ';
      counter.textContent=Math.ceil(anim.exhale-exPos)+'с';
    }
    mantra.textContent='';
  }
  else if(anim.type==='mantra'){
    const beats=anim.beats;
    const totalCycle=beats.reduce((s,b)=>s+b.duration,0);
    const pos=elapsed%totalCycle;
    let acc=0;
    for(const beat of beats){
      if(pos<acc+beat.duration){
        const s=beat.scale==='inhale'?1.0:0.6;
        circle.style.transition=`transform ${beat.duration*0.3}s ease`;
        circle.style.transform=`scale(${s})`;
        label.textContent=beat.label;
        counter.textContent='';
        break;
      }
      acc+=beat.duration;
    }
    mantra.textContent='';
  }
  else if(anim.type==='mantraMulti'){
    const inhaleDur=anim.parts*anim.partDuration;
    const exhaleDur=anim.parts*anim.partDuration;
    const cycle=inhaleDur+exhaleDur;
    const pos=elapsed%cycle;
    if(pos<inhaleDur){
      const partIdx=Math.floor(pos/anim.partDuration);
      const progress=(partIdx+1)/anim.parts;
      const s=0.55+0.45*progress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent='ВДОХ';
      mantra.textContent=anim.inhaleMantra;
      counter.textContent=`${partIdx+1}/${anim.parts}`;
    } else {
      const exPos=pos-inhaleDur;
      const partIdx=Math.floor(exPos/anim.partDuration);
      const progress=(partIdx+1)/anim.parts;
      const s=1.0-0.45*progress;
      circle.style.transition='none';
      circle.style.transform=`scale(${s})`;
      label.textContent='ВЫДОХ';
      mantra.textContent=anim.exhaleMantra;
      counter.textContent=`${partIdx+1}/${anim.parts}`;
    }
  }
  else if(anim.type==='fire'){
    const rate=2.5; // breaths per second
    const pos=elapsed*rate;
    const phase=pos%1;
    const s=phase<0.35?0.55+0.3*(phase/0.35):0.85-0.3*((phase-0.35)/0.65);
    circle.style.transition='none';
    circle.style.transform=`scale(${s})`;
    label.textContent='🔥';
    mantra.textContent='';
    counter.textContent='';
  }

  animFrameId=requestAnimationFrame(runAnimation);
}

// ===== AUDIO =====
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playGong(){
  try{
    const ctx=getAudioCtx();
    if(ctx.state==='suspended') ctx.resume();

    // Layer 1: fundamental
    const osc1=ctx.createOscillator();
    const gain1=ctx.createGain();
    osc1.type='sine';
    osc1.frequency.value=220;
    gain1.gain.setValueAtTime(0.3,ctx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+3);
    osc1.connect(gain1);
    gain1.connect(ctx.destination);
    osc1.start(ctx.currentTime);
    osc1.stop(ctx.currentTime+3);

    // Layer 2: harmonic
    const osc2=ctx.createOscillator();
    const gain2=ctx.createGain();
    osc2.type='sine';
    osc2.frequency.value=440;
    gain2.gain.setValueAtTime(0.15,ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(ctx.currentTime);
    osc2.stop(ctx.currentTime+2);

    // Layer 3: high shimmer
    const osc3=ctx.createOscillator();
    const gain3=ctx.createGain();
    osc3.type='sine';
    osc3.frequency.value=660;
    gain3.gain.setValueAtTime(0.08,ctx.currentTime);
    gain3.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
    osc3.connect(gain3);
    gain3.connect(ctx.destination);
    osc3.start(ctx.currentTime);
    osc3.stop(ctx.currentTime+1.5);
  }catch(e){}
}

function vibrate(){
  try{
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
  }catch(e){}
}

// ===== WAKE LOCK =====
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null});
    }
  }catch(e){}
}

function releaseWakeLock(){
  try{
    if(wakeLock){wakeLock.release();wakeLock=null;}
  }catch(e){}
}

// Re-acquire on visibility change
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&isRunning) requestWakeLock();
});

// ===== FULLSCREEN =====
function requestFullscreen(){
  try{
    const el=document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }catch(e){}
}
